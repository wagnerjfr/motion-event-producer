syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.simulation.producer.grpc";
option java_outer_classname = "MotionEventsProto";

package motionevents;

message PositionEventMessage {
  string ball_id = 1;
  int64 timestamp_ms = 2;
  double x = 3;
  double y = 4;
  double vx = 5;
  double vy = 6;
}

message CollisionEventMessage {
  string ball_a_id = 1;
  string ball_b_id = 2;
  int64 timestamp_ms = 3;
  double x = 4;
  double y = 5;
  double relative_speed = 6;
}

message EventEnvelope {
  oneof event {
    PositionEventMessage position = 1;
    CollisionEventMessage collision = 2;
  }
}

message PublishResponse {
  bool accepted = 1;
  string message = 2;
}

service MotionEventIngestService {
  rpc Publish (EventEnvelope) returns (PublishResponse);
}